<section class="hero">
  <div class="hero-bg">
    <img [src]="heroBg" alt="" class="hero-img" />
    <div class="hero-gradient"></div>
  </div>
  <div class="hero-content">
    <div class="hero-badge">ESTABLISHED 2024</div>
    <div class="hero-title">
      <h1>ZENITH</h1>
      <h1 class="muted">DEVELOPMENTS</h1>
    </div>
    <p class="hero-tagline">Defy every limit</p>
    <div class="hero-actions">
      <a href="#projects" class="btn-primary">EXPLORE PROJECTS</a>
      <a href="#about" class="btn-outline">ABOUT US</a>
    </div>
  </div>
  <div class="scroll-indicator">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</section>
